<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - ExaltTrader</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{min-height:100vh;background:linear-gradient(135deg,#070b14,#111827);color:#fff;display:flex;align-items:center;justify-content:center}
    .card{width:100%;max-width:420px;background:#111827;border:1px solid #243044;border-radius:18px;padding:35px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
    .logo{text-align:center;font-size:30px;font-weight:800;color:#22c55e;margin-bottom:8px}
    .subtitle{text-align:center;color:#9ca3af;margin-bottom:30px}
    input{width:100%;padding:14px;margin-bottom:15px;border-radius:10px;border:1px solid #374151;background:#0b1220;color:#fff;font-size:15px}
    button{width:100%;padding:14px;border:0;border-radius:10px;background:#22c55e;color:#06120a;font-weight:700;font-size:16px;cursor:pointer}
    button:hover{background:#16a34a}
    p{text-align:center;margin-top:20px;color:#9ca3af}
    a{color:#22c55e;text-decoration:none;font-weight:700}
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">ExaltTrader</div>
    <div class="subtitle">Create your free demo trading account</div>

    <form id="registerForm">
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Create Account</button>
    </form>

    <p>Already have an account? <a href="login.html">Login</a></p>
  </div>

  <script>
    document.getElementById("registerForm").addEventListener("submit", function(e){
      e.preventDefault();

      const user = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        balance: 10000
      };

      localStorage.setItem("exaltUser", JSON.stringify(user));
      alert("Account created successfully");
      window.location.href = "login.html";
    });
  </script>

</body>
</html>
