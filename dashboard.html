<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - ExaltTrader</title>
  <script src="https://s3.tradingview.com/tv.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{background:#070b14;color:#fff}
    header{height:70px;background:#111827;border-bottom:1px solid #243044;display:flex;align-items:center;justify-content:space-between;padding:0 30px}
    .logo{font-size:26px;font-weight:800;color:#22c55e}
    .logout{background:#ef4444;color:#fff;border:0;padding:10px 18px;border-radius:8px;cursor:pointer}
    .wrap{padding:25px;display:grid;grid-template-columns:2fr 1fr;gap:25px}
    .panel{background:#111827;border:1px solid #243044;border-radius:16px;padding:20px}
    .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:20px}
    .card{background:#0b1220;border:1px solid #243044;border-radius:14px;padding:18px}
    .label{color:#9ca3af;font-size:14px;margin-bottom:8px}
    .value{font-size:24px;font-weight:800;color:#22c55e}
    #chart{height:430px}
    input,select{width:100%;padding:13px;margin:10px 0;border-radius:10px;border:1px solid #374151;background:#0b1220;color:#fff}
    .buy{background:#22c55e;color:#06120a}
    .sell{background:#ef4444;color:#fff}
    button{width:100%;padding:13px;border:0;border-radius:10px;margin-top:10px;font-weight:800;cursor:pointer}
    ul{list-style:none;margin-top:15px}
    li{background:#0b1220;margin-bottom:10px;padding:12px;border-radius:10px;color:#d1d5db}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.cards{grid-template-columns:1fr}}
  </style>
</head>
<body>

<script>
  if(localStorage.getItem("isLoggedIn") !== "true"){
    window.location.href = "login.html";
  }
</script>

<header>
  <div class="logo">ExaltTrader</div>
  <button class="logout" onclick="logout()">Logout</button>
</header>

<div class="wrap">
  <main>
    <div class="cards">
      <div class="card">
        <div class="label">BTC Price</div>
        <div class="value">$<span id="btc">Loading</span></div>
      </div>
      <div class="card">
        <div class="label">ETH Price</div>
        <div class="value">$<span id="eth">Loading</span></div>
      </div>
      <div class="card">
        <div class="label">Demo Balance</div>
        <div class="value">$<span id="balance">10000</span></div>
      </div>
    </div>

    <div class="panel">
      <h2>BTC/USDT Live Chart</h2>
      <br>
      <div id="chart"></div>
    </div>
  </main>

  <aside class="panel">
    <h2>Demo Trade</h2>

    <select id="coin">
      <option value="BTC">BTC</option>
      <option value="ETH">ETH</option>
    </select>

    <input type="number" id="amount" placeholder="Amount in USD">

    <button class="buy" onclick="trade('BUY')">Buy</button>
    <button class="sell" onclick="trade('SELL')">Sell</button>

    <h2 style="margin-top:25px;">Trade History</h2>
    <ul id="history"></ul>
  </aside>
</div>

<script>
  let balance = 10000;
  let history = [];

  function logout(){
    localStorage.removeItem("isLoggedIn");
    window.location.href = "login.html";
  }

  async function loadPrices(){
    try{
      const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd");
      const data = await res.json();
      document.getElementById("btc").innerText = data.bitcoin.usd;
      document.getElementById("eth").innerText = data.ethereum.usd;
    }catch(e){
      document.getElementById("btc").innerText = "N/A";
      document.getElementById("eth").innerText = "N/A";
    }
  }

  function trade(type){
    const coin = document.getElementById("coin").value;
    const amount = Number(document.getElementById("amount").value);

    if(!amount || amount <= 0){
      alert("Enter valid amount");
      return;
    }

    if(type === "BUY"){
      if(amount > balance){
        alert("Insufficient demo balance");
        return;
      }
      balance -= amount;
    } else {
      balance += amount;
    }

    document.getElementById("balance").innerText = balance.toFixed(2);

    const item = `${type} ${coin} - $${amount}`;
    history.unshift(item);
    renderHistory();
    document.getElementById("amount").value = "";
  }

  function renderHistory(){
    document.getElementById("history").innerHTML = history.map(x => `<li>${x}</li>`).join("");
  }

  loadPrices();
  setInterval(loadPrices, 30000);

  new TradingView.widget({
    width: "100%",
    height: 430,
    symbol: "BINANCE:BTCUSDT",
    interval: "15",
    timezone: "Etc/UTC",
    theme: "dark",
    style: "1",
    locale: "en",
    container_id: "chart"
  });
</script>

</body>
</html>
